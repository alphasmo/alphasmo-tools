name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write # npm Trusted Publisher OIDC — no NODE_AUTH_TOKEN needed
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Requires the "alphasmo" package's Trusted Publisher to be configured on
      # npmjs.com to point at this repo + workflow file before the first release —
      # a one-time manual step on npmjs.com, not something this workflow bootstraps.
      - run: npm publish --provenance --access public
